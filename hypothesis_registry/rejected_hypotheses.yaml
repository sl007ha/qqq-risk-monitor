rejected_hypotheses:
  - hypothesis_id: I003_H002
    status: dropped_exact_variant
    source_iteration: iteration_003
    evidence:
      base_rate_lift: 1.85
      alert_burden: 0.1170
      event_coverage: 0.4254
      positive_lift_folds: "8/19"
      median_lead_bd: 0.0
    reason: Lower burden did not compensate for worse lift, event coverage, fold stability, and unchanged 0BD lead time versus I002_H002.
    lesson: Do not reduce cross-asset burden by removing the stable coverage that made I002_H002 useful.

  - hypothesis_id: I003_H004
    status: rejected_false_repair_variant
    source_iteration: iteration_003
    evidence:
      base_rate_lift: 0.19
      alert_burden: 0.0221
      event_coverage: 0.0
      positive_lift_folds: "0/19"
      median_lead_bd: null
    reason: Simplified false-repair trigger produced no event coverage and no positive-lift folds.
    lesson: Do not retest the same MMDI-repair plus unresolved-price-damage structure against the same target without new data or a new target definition.

  - hypothesis_id: I003_H003
    status: rejected_as_standalone_alert
    source_iteration: iteration_003
    evidence:
      base_rate_lift: 1.55
      alert_burden: 0.2367
      event_coverage: 0.7759
      positive_lift_folds: "8/19"
      median_lead_bd: 3.0
    reason: Leadership coverage companion covered many events, but alert burden was too high and selectivity too weak for a standalone alert.
    lesson: Leadership evidence should be used as context or a second-stage overlay, not as the broad standalone I003_H003 trigger.

  - hypothesis_id: FD001_H003_VOL_DISAGREEMENT_REGIME_SHIFT
    status: rewrite_as_context_not_standalone
    source_iteration: iteration_004_fd001
    parent_feature_snapshot_id: FD_001_combined
    evidence:
      base_rate_lift: 1.0810090824572696
      alert_burden: 0.050741775962158675
      event_coverage: 0.3176470588235294
      positive_lift_folds: "4/19"
      median_lead_bd: 10.0
    reason: Low burden and longer lead time were not enough to overcome weak lift, low event coverage, and poor fold stability.
    lesson: Volatility disagreement should be used as context or confirmation overlay, not as a standalone alert.

  - hypothesis_id: FD001_H004_FALSE_CALM_VOL_DISAGREEMENT_CONFIRMATION
    status: dropped_direct_trigger
    source_iteration: iteration_004_fd001
    parent_feature_snapshot_id: FD_001_combined
    evidence:
      base_rate_lift: 0.8721987810595405
      alert_burden: 0.02257579015265534
      event_coverage: 0.17647058823529413
      positive_lift_folds: "4/19"
      median_lead_bd: 12.0
    reason: Very low burden and longer lead time did not compensate for sub-base hit-rate lift and low event coverage.
    lesson: Do not retest this false-calm plus volatility-disagreement trigger directly without a changed target or trigger structure.

  - hypothesis_id: FD001_H001_FALSE_CALM_CONFIRMED_DOWNSIDE
    status: dropped_direct_trigger
    source_iteration: iteration_004_fd001
    parent_feature_snapshot_id: FD_001_combined
    evidence:
      base_rate_lift: 0.8025139574660342
      alert_burden: 0.13933849401829698
      event_coverage: 0.4878048780487805
      positive_lift_folds: "7/19"
      median_lead_bd: 3.0
    reason: Confirmed false-calm deterioration did not improve hit-rate lift and carried high burden.
    lesson: FD_001 confirmed false-calm is not sufficient as a direct trigger against the 30BD -8% MDD target.

failed_lessons:
  false_repair:
    related_hypotheses:
      - I002_H004
      - I003_H004
    lesson: Both over-constrained and simplified false-repair variants failed on 30BD MDD; revisit only with event-based repair features, a different target, or explicit human-approved data additions.
  leadership_context:
    related_hypotheses:
      - I002_H003
      - I003_H003
    lesson: Tight leadership logic has useful low-burden lead time, while relaxed leadership logic is high coverage but too broad.
  fd001_false_calm:
    related_hypotheses:
      - FD001_H001_FALSE_CALM_CONFIRMED_DOWNSIDE
      - FD001_H004_FALSE_CALM_VOL_DISAGREEMENT_CONFIRMATION
    lesson: FD_001 false-calm features did not work as direct triggers in iteration_004_fd001; keep them as diagnostics or redesign with a different target.
