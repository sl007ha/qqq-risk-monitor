rewrite_queue:
  - queue_id: RQ004_FALSE_CALM_BURDEN_REDUCTION
    source_hypotheses:
      - I003_H005
      - I002_H005
    objective: Reduce false-calm alert burden while preserving event coverage and lead time.
    required_constraints:
      - No threshold optimization.
      - Use only exact feature columns verified in the inventory.
      - Do not use live sentiment or headline features for historical tests.
      - Keep production dashboard logic unchanged.
    next_iteration_candidate: iteration_004

  - queue_id: RQ004_DOWNSIDE_VOL_COMPARISON
    source_hypotheses:
      - I002_H001
      - I003_H001
    objective: Compare downside-volatility signals at event level rather than optimizing daily lift.
    required_constraints:
      - Treat I002_H001 as the baseline.
      - Use I003_H001 only as comparison or context until evidence justifies otherwise.
      - Preserve both variants in analysis.
    next_iteration_candidate: iteration_004

  - queue_id: RQ004_LEADERSHIP_CONTEXT_OVERLAY
    source_hypotheses:
      - I002_H003
      - I003_H003
    objective: Test leadership evidence as context for false-calm or downside-volatility alerts, not as a standalone high-burden trigger.
    required_constraints:
      - Do not promote I003_H003 as a standalone alert.
      - Require alert-burden evidence before considering any dashboard candidate.
    next_iteration_candidate: iteration_004

