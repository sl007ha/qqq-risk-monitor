version: 1
as_of: 2026-07-01
purpose: Machine-readable queue for Research Orchestrator v1.

queue_policy:
  first_ready_task_wins: true
  blocked_tasks_require_completed_dependencies: true
  codex_task_output: research_loop/next_codex_task.md
  no_external_services: true
  no_production_file_changes: true

tasks:
  - task_id: FD_001_BATCH_B_V2_QA_AND_COMBINED_SNAPSHOT
    status: completed
    priority: 1
    stage: FEATURE_LAB_REVIEW
    title: Run FD_001 Batch B v2 QA patch and create combined experimental snapshot
    objective: >
      Patch FD_001 Batch B into a v2 feature lab with explicit false-calm
      missing-uncertainty flags, then rebuild the FD_001 combined experimental
      snapshot from Batch A v2 and Batch B v2.
    prompt_template: prompts/stage_feature_lab_review.md
    inputs:
      - feature_lab/FD_001_batch_B/run_feature_lab_fd001_batch_b.py
      - feature_lab/FD_001_batch_B/validation_summary.md
      - feature_lab/FD_001_batch_B/experimental_feature_snapshot.csv
      - feature_lab/FD_001_batch_A_v2/validation_summary.md
      - feature_lab/FD_001_batch_A_v2/experimental_feature_snapshot.csv
      - outputs/qqq_r2_mmdi_v1_3_1_all_features_daily_wide.csv
    outputs:
      - feature_lab/FD_001_batch_B_v2/run_feature_lab_fd001_batch_b_v2.py
      - feature_lab/FD_001_batch_B_v2/experimental_feature_snapshot.csv
      - feature_lab/FD_001_batch_B_v2/experimental_feature_inventory.csv
      - feature_lab/FD_001_batch_B_v2/coverage_summary.csv
      - feature_lab/FD_001_batch_B_v2/validation_summary.md
      - feature_lab/FD_001_batch_B_v2/feature_snapshot_manifest.yaml
      - feature_lab/FD_001_combined/experimental_feature_snapshot.csv
      - feature_lab/FD_001_combined/experimental_feature_inventory.csv
      - feature_lab/FD_001_combined/coverage_summary.csv
      - feature_lab/FD_001_combined/validation_summary.md
      - feature_lab/FD_001_combined/feature_snapshot_manifest.yaml
      - feature_lab/FD_001_combined/next_step_recommendation.md
    allowed_files:
      - feature_lab/FD_001_batch_B_v2/
      - feature_lab/FD_001_combined/
      - research_loop/
    blocked_files:
      - qqq_autoresearch/features.py
      - qqq_autoresearch/data_sources.py
      - qqq_autoresearch/config.py
      - qqq_autoresearch/pipeline.py
      - qqq_autoresearch/render.py
      - run_dashboard.py
      - outputs/
    gates:
      - no_hypothesis_tests
      - no_production_dashboard_logic_changes
      - no_production_feature_construction_changes
      - use_existing_daily_wide_input_only
      - no_future_target_or_future_drawdown_inputs
    validators:
      - research_loop/validators/validate_no_protected_pr_diff.py
      - research_loop/validators/validate_feature_snapshot.py --snapshot-dir feature_lab/FD_001_batch_B_v2
      - research_loop/validators/validate_feature_snapshot.py --snapshot-dir feature_lab/FD_001_combined
    human_approval_required: false
    completed_at_utc: '2026-07-01T06:45:51+00:00'
    completion_evidence:
      - feature_lab/FD_001_combined/validation_summary.md
      - feature_lab/FD_001_combined/next_step_recommendation.md
    created_from:
      - feature_lab/FD_001_batch_B/validation_summary.md
      - feature_lab/FD_001_batch_A_v2/validation_summary.md

  - task_id: FD_001_FEATURE_TO_HYPOTHESIS_PLANNING
    status: ready
    blocked_by:
      - FD_001_BATCH_B_V2_QA_AND_COMBINED_SNAPSHOT
    priority: 1
    stage: FEATURE_TO_HYPOTHESIS_PLANNING
    title: Plan FD_001-derived hypothesis candidates from frozen experimental features
    objective: >
      Convert the accepted candidate_hypothesis_design columns from the frozen
      FD_001 combined experimental snapshot into pre-declared hypothesis
      candidates without running tests.
    prompt_template: prompts/stage_feature_to_hypothesis_planning.md
    inputs:
      - feature_lab/FD_001_combined/experimental_feature_snapshot.csv
      - feature_lab/FD_001_combined/experimental_feature_inventory.csv
      - feature_lab/FD_001_combined/validation_summary.md
      - feature_lab/FD_001_combined/next_step_recommendation.md
      - research_loop/research_state.yaml
      - hypothesis_registry/rewrite_queue.yaml
      - feature_specs/
    outputs:
      - hypothesis_registry/fd_001_feature_to_hypothesis_plan.yaml
      - feature_research/FD_001/feature_to_hypothesis_plan.md
    allowed_files:
      - hypothesis_registry/
      - feature_research/FD_001/
      - research_loop/
      - prompts/
    blocked_files:
      - qqq_autoresearch/features.py
      - qqq_autoresearch/data_sources.py
      - qqq_autoresearch/config.py
      - qqq_autoresearch/pipeline.py
      - qqq_autoresearch/render.py
      - run_dashboard.py
      - outputs/
    gates:
      - no_hypothesis_tests
      - no_new_test_implementation
      - no_production_dashboard_logic_changes
      - thresholds_predeclared_not_optimized
      - exact_experimental_columns_only
    validators:
      - research_loop/validators/validate_no_protected_pr_diff.py
      - research_loop/validators/validate_feature_snapshot.py --snapshot-dir feature_lab/FD_001_combined
    human_approval_required: false
