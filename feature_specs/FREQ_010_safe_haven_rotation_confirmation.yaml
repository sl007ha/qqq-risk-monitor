version: 1
feature_id: FREQ_010
title: Safe-haven rotation confirmation
status: proposed_feature
source_type: market_mechanism
source_references:
  - feature_research/FD_001/extracted_feature_ideas.yaml
  - https://www.financialresearch.gov/financial-stress-index/
  - https://www.bis.org/publ/work1250.htm
source_hypotheses:
  - I002_H002
  - I002_H003

economic_mechanism: Risk-off behavior often includes safe-haven demand. Distinguishing classic risk-off from rates-led stress may improve cross-asset and leadership context hypotheses.
raw_inputs:
  - tlt_ret_20d
  - ief_ret_20d
  - tlt_ief_rel_3m
  - xlu_vs_spy_3m
  - xlp_vs_spy_3m
  - ust10y_change_20d
formula: Classify safe-haven confirmation when Treasury or defensive relatives strengthen during QQQ stress, and classify rates-led stress when yields rise while duration assets fail to confirm.
data_source: Current exported feature inventory.
expected_direction: Safe-haven confirmation should increase broad acute-shock odds; rates-led stress without safe-haven support may increase tech-specific fragility.
candidate_hypothesis_use: Cross-asset acute-shock and leadership context overlays.
point_in_time_risk: Low to medium. ETF and Treasury market data are date-local but histories start at different dates.
leakage_risks:
  - Use only trailing returns and relative-strength measures.
  - Do not infer future risk-off classification from subsequent drawdown.
redundancy_check:
  inventory_file: outputs/qqq_r2_mmdi_v1_3_1_all_feature_inventory.csv
  related_existing_columns:
    - tlt_ret_20d
    - ief_ret_20d
    - tlt_ief_rel_3m
    - xlu_vs_spy_3m
    - xlp_vs_spy_3m
  result: partially_redundant
  notes: Current relatives exist; the risk-off versus rates-led regime classification is new.
coverage_requirement:
  minimum_start_date: 2008-01-02
  minimum_non_null_fraction: 0.70
  minimum_event_coverage_review: required
implementation_plan:
  allowed_location: feature_lab/FREQ_010_safe_haven_rotation_confirmation/
  production_files_touched: []
  experimental_outputs:
    - feature_lab/FREQ_010_safe_haven_rotation_confirmation/outputs/experimental_feature_snapshot.csv
validation_plan:
  - Report coverage by ETF input.
  - Compare against defensive sector rotation features.
  - Confirm stress classification uses only current and trailing data.
classification:
  historical_use: research_only
  live_sentiment_or_headline: false
  point_in_time_archive_required: false
implementation_complexity: low
production_promotion_status:
  allowed_without_human_approval: false
  human_approval_required_for:
    - production feature construction
    - dashboard integration
    - protected file edits
