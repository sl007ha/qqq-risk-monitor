feature_ideas:
  - idea_id: FREQ_001
    title: Cross-asset stress sequence score
    promoted_to_spec: true
    source: [local_rewrite_queue, local_feature_requests, ext_bis_market_stress_ml_2025]
    economic_mechanism: Cross-asset stress often propagates through credit, rates, FX, and volatility before equity damage becomes visible.
    raw_inputs: [credit_spread_20d_change, ig_oas_change_20d, ust10y_change_20d, dxy_change_20d, vix_change_20d, vix9d_vs_vix]
    formula: Count pre-declared stress flags across credit, rates, dollar, and volatility over 5D and 20D windows; add a sequence flag when at least two non-equity stress families deteriorate before QQQ drawdown acceleration.
    data_source: Current exported feature inventory.
    expected_direction: Higher sequence score should imply higher future acute shock risk and better lead time.
    point_in_time_risk: Low to medium; FRED release timing and market close alignment must be documented.
    coverage_expectation: Medium to high; limited by shorter IG OAS and VIX term structure histories.
    redundancy_check:
      related_existing_columns: [credit_spread_20d_change, ig_oas_change_20d, ust10y_change_20d, dxy_change_20d, vix_change_20d]
      assessment: Partially redundant levels and changes exist; sequence ordering across families is not currently represented.
    candidate_hypotheses: [I002_H002 successor, RQ004 false-calm confirmation overlay]
    implementation_complexity: medium

  - idea_id: FREQ_002
    title: Funding liquidity pressure bundle
    promoted_to_spec: true
    source: [ext_bis_market_stress_ml_2025, ext_ofr_fsi, local_feature_requests]
    economic_mechanism: Funding stress can tighten risk appetite and force deleveraging before broad equity drawdowns.
    raw_inputs: [nfci, sofr_spread_proxy, fedfunds, credit_spread, hy_ig_spread, liquidity_regime]
    formula: Combine percentile-ranked funding and credit pressure, requiring deterioration across at least two funding/liquidity proxies.
    data_source: Current FRED-derived exported columns plus existing liquidity proxies.
    expected_direction: Higher funding pressure should increase future drawdown and acute-shock risk.
    point_in_time_risk: Medium; macro series release lags and revisions must be handled.
    coverage_expectation: Medium; SOFR begins in 2018 and some credit series have shorter history.
    redundancy_check:
      related_existing_columns: [nfci, sofr_spread_proxy, credit_spread, hy_ig_spread, liquidity_regime]
      assessment: Existing columns are individual proxies; the bundle would test combined funding pressure.
    candidate_hypotheses: [cross-asset acute shock, false-calm burden reduction]
    implementation_complexity: medium

  - idea_id: FREQ_003
