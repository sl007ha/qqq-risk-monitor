  - idea_id: FREQ_008
    title: Regime-shift volatility disagreement
    promoted_to_spec: true
    source: [ext_fed_volatility_models_2025, ext_regime_aware_vol_2026, ext_vit_realized_vol_2025]
    economic_mechanism: Volatility forecast models degrade around regime changes; disagreement between short-term realized volatility, long-term realized volatility, and market-implied volatility can mark unstable regimes.
    raw_inputs: [qqq_vol_10d, qqq_vol_20d, qqq_vol_60d, realized_vol_252d, vix, vxn, vol_20d_vs_252d]
    formula: Compare short realized volatility, longer realized volatility, and implied volatility proxies; flag widening disagreement and abrupt rank changes.
    data_source: Current exported feature inventory.
    expected_direction: Higher disagreement should increase regime-shift and path-risk odds.
    point_in_time_risk: Low; market-derived trailing and same-day close fields.
    coverage_expectation: High for QQQ/VIX, medium where VXN is missing before 2001.
    redundancy_check:
      related_existing_columns: [vol_20d_vs_252d, vix, vxn, qqq_vol_20d, qqq_vol_60d]
      assessment: Ratios exist; three-way disagreement and rank-change construct is distinct.
    candidate_hypotheses: [I002_H001 comparison, false-calm burden reduction]
    implementation_complexity: low

