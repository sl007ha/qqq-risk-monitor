    promoted_to_spec: true
    source: [local_rewrite_queue, local_iteration_003_analysis, local_iteration_003_decision_log]
    economic_mechanism: Calm dashboard states can hide accumulating internal damage when R2 is quiet but breadth, volatility, trend, or MMDI components deteriorate.
    raw_inputs: [R2_ACTIVE, R2_STRESS_COUNT, MMDI, MMDI_10D_CHANGE, mmdi_20d_change, downside_vol_20d, price_vs_ma50, qqq_dd_20d]
    formula: During non-active R2 states, count independent internal deterioration families using pre-declared training-window quantiles or fixed signs.
    data_source: Current exported feature inventory.
    expected_direction: Higher hidden deterioration count should increase future path-risk odds while reducing broad false-calm alerts.
    point_in_time_risk: Low; inputs are historical market-derived features available through each date.
    coverage_expectation: High from 1999 except columns with rolling-window warmup.
    redundancy_check:
      related_existing_columns: [R2_ACTIVE, R2_STRESS_COUNT, MMDI, MMDI_10D_CHANGE, mmdi_20d_change]
      assessment: Existing columns include components; explicit false-calm conditional count is not present.
    candidate_hypotheses: [I003_H005 rewrite, RQ004_FALSE_CALM_BURDEN_REDUCTION]
    implementation_complexity: low

  - idea_id: FREQ_004
    title: Repair episode quality score
    promoted_to_spec: true
    source: [local_feature_requests, local_iteration_003_analysis, local_iteration_003_decision_log]
    economic_mechanism: Failed repairs are episodic; bounce durability and reclaim failures may matter more than a single repair-state observation.
    raw_inputs: [qqq_close, qqq_dd_20d, qqq_dd_60d, rebound_from_trough_20d, failed_reclaim_ma50, failed_reclaim_ma200, lower_high_flag, lower_low_flag, mmdi_low_after_high]
    formula: Score repair episodes after drawdown by combining rebound size, failed reclaim count, lower-high/lower-low flags, and MMDI relapse during the repair window.
    data_source: Current exported feature inventory.
    expected_direction: Lower repair quality should increase future repair-failure or path-risk probability.
    point_in_time_risk: Low; price-derived and MMDI-derived fields are date-local if constructed from trailing data.
    coverage_expectation: High after rolling-window warmups.
    redundancy_check:
      related_existing_columns: [failed_reclaim_ma50, failed_reclaim_ma200, lower_high_flag, lower_low_flag, rebound_from_trough_20d]
      assessment: Components exist; episode-level aggregation and repair-window conditioning are new.
    candidate_hypotheses: [repair_failure successor, false-calm confirmation overlay]
    implementation_complexity: medium

  - idea_id: FREQ_005
    title: Downside-volatility persistence ratio
    promoted_to_spec: true
    source: [local_rewrite_queue, local_iteration_003_analysis, ext_fed_volatility_models_2025, ext_regime_aware_vol_2026]
    economic_mechanism: Persistent downside volatility is more informative than isolated volatility spikes because it indicates sustained pressure rather than transient noise.
    raw_inputs: [downside_vol_20d, upside_vol_20d, downside_upside_vol_ratio, realized_skew_20d, large_red_day_count_20d, gap_down_count_20d]
    formula: Ratio of days in the trailing 20D/60D windows with downside-volatility stress, negative skew, or repeated red-day/gap stress.
    data_source: Current exported feature inventory.
    expected_direction: Higher persistence should increase future 30BD path-risk odds and fold stability.
    point_in_time_risk: Low; all inputs are trailing market-derived values.
    coverage_expectation: High after volatility warmup windows.
    redundancy_check:
      related_existing_columns: [downside_vol_20d, downside_upside_vol_ratio, realized_skew_20d, large_red_day_count_20d, gap_down_count_20d]
      assessment: Existing daily levels exist; persistence/duration of stress is not directly represented.
    candidate_hypotheses: [I002_H001 event-level comparison, I003_H001 comparison]
    implementation_complexity: low

  - idea_id: FREQ_006
