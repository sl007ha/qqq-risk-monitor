    promoted_to_spec: true
    source: [local_rewrite_queue, local_feature_requests, local_iteration_003_decision_log]
    economic_mechanism: Narrow leadership can be useful as context, but broad leadership alerts become too burdensome when used alone.
    raw_inputs: [qqq_vs_qqqe_3m, qqq_vs_iwm_3m, qqq_vs_soxx_3m, soxx_vs_spy_3m, mag7_equal_weight_vs_qqq, mag7_breadth]
    formula: Context gate that requires persistent leadership divergence or semiconductor non-confirmation only when another risk candidate is active.
    data_source: Current exported feature inventory.
    expected_direction: Leadership deterioration should raise risk conditional on false-calm or downside-volatility stress.
    point_in_time_risk: Medium; ETF proxies are historical, but Mag7 composition is fixed and must be treated as proxy-based, not constituent-universe proof.
    coverage_expectation: Medium; QQQE and some relatives begin later than QQQ.
    redundancy_check:
      related_existing_columns: [qqq_vs_qqqe_3m, qqq_vs_iwm_3m, soxx_vs_spy_3m, mag7_breadth]
      assessment: Existing relative-strength levels exist; conditional context gate is new.
    candidate_hypotheses: [I002_H003 context overlay, I003_H005 burden reduction]
    implementation_complexity: medium

